server:
  port: 8082
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 10
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

spring:
  mvc:
    static-path-pattern: /**
  application:
    name: GameSphere
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100
      thread-name-prefix: async-task-
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sm_db?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false&zeroDateTimeBehavior=convertToNull
    username: root
    password: xsj123...
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      auto-commit: false
      idle-timeout: 600000
      pool-name: HikariPool-Dev
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 60000

mybatis-plus:
  mapper-locations: classpath*:/com/xsj/mapper/**/*.xml
  type-aliases-package: com.xsj.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false


# JWT 配置
jwt:
  secret: GameSphere-Secret-Key-2026-Change-In-Production
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    root: INFO
    com.xsj: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springdoc: INFO
    com.zaxxer.hikari: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/GameSphere.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# Swagger/OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true

# 文件上传路径
file:
  upload:
    path: D:/GameSphere/uploads/
    avatar-path: ${file.upload.path}avatar/
    game-path: ${file.upload.path}games/

# 爬虫配置
crawler:
  enabled: true
  user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
  timeout: 30000
  delay: 1000
  max-retry: 3

# IGDB API 配置
igdb:
  client-id: qgl0bq4bx1diw5wmiv07upqdn54ucg
  client-secret: sb117ubhppup2hyi72i9beicdjv5qp
  base-url: https://api.igdb.com/v4
  token-url: https://id.twitch.tv/oauth2/token
  proxy:
    enabled: true
    host: 127.0.0.1
    port: 9674


cors:
  allowed-origin: http://localhost:5173

# 推荐算法配置
recommendation:
  enabled: true
  cache-expire: 3600
  min-games: 300
  algorithms:
    collaborative-filtering:
      enabled: true
      weight: 0.4
    content-based:
      enabled: true
      weight: 0.4
    hot-games:
      enabled: true
      weight: 0.2
