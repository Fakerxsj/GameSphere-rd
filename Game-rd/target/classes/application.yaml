server:
  port: 8082
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 10
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

spring:
  mvc:
    static-path-pattern: /**
  application:
    name: GameSphere
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100
      thread-name-prefix: async-task-

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.xsj.pojo
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

# JWT 配置
jwt:
  secret: GameSphere-Secret-Key-2026-Change-In-Production
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    root: INFO
    com.xsj: DEBUG
    com.xsj.mapper: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/GameSphere.log
    max-size: 100MB
    max-history: 30

# Swagger/OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    use-root-path: true

# 文件上传路径
file:
  upload:
    path: D:/GameSphere/uploads/
    avatar-path: ${file.upload.path}avatar/
    game-path: ${file.upload.path}games/

# 爬虫配置
crawler:
  enabled: true
  user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
  timeout: 30000
  delay: 1000
  max-retry: 3

# 推荐算法配置
recommendation:
  enabled: true
  cache-expire: 3600
  min-games: 300
  algorithms:
    collaborative-filtering:
      enabled: true
      weight: 0.4
    content-based:
      enabled: true
      weight: 0.4
    hot-games:
      enabled: true
      weight: 0.2

